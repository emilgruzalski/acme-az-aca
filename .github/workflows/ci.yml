name: Continuous Integration

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: emilgruzalski/gh-actions/.github/workflows/ci-img-go.yml@v1
    with:
      image-name: 'acme-az-aca'
      push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
      packages: write